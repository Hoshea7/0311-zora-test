name: Release Gate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.3)"
        required: true
        type: string

jobs:
  automated-gates:
    name: "Automated Release Gates"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run typecheck

      - name: "L1+L2: Unit & Integration tests"
        run: bun run test

      - name: Build check
        run: bun run build

      - name: "L3: Live Agent tests"
        env:
          ZORA_TEST_PROVIDER_CONFIG: ${{ secrets.ZORA_TEST_PROVIDER_CONFIG }}
          ZORA_REQUIRE_LIVE_PROVIDER: "1"
        run: bun run test:live

      - name: "Gate Summary"
        if: always()
        run: |
          echo "## Release Gate Results for v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Automated (L1-L3)" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] L1+L2 Unit & Integration" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] TypeScript check" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Build check" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] L3 Live Agent tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GUI / Manual Debt (L3)" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] L3-PROV-001: 首次启动 Provider 引导 (Computer Use)" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] L2-REG-001: PDF 422 回归" >> $GITHUB_STEP_SUMMARY
