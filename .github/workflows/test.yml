name: Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_tests:
        description: "Run L3 Live Agent tests"
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: "L1+L2 Unit & Integration"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run typecheck

      - name: Run L1+L2 tests
        run: bun run test

      - name: Build check
        run: bun run build

      - name: Check test sync
        if: github.event_name == 'pull_request'
        run: |
          SRC_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'src/' | wc -l)
          TEST_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'tests/' 'qa/' | wc -l)
          if [ "$SRC_CHANGED" -gt 0 ] && [ "$TEST_CHANGED" -eq 0 ]; then
            echo "::warning::src/ 有 ${SRC_CHANGED} 个文件变更，但 tests/ 和 qa/ 无变更。请确认是否需要同步测试。"
          else
            echo "✓ 测试同步检查通过 (src: ${SRC_CHANGED} files, tests+qa: ${TEST_CHANGED} files)"
          fi

  live-test:
    name: "L3 Live Agent"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_live_tests == 'true'
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run L3 Live tests
        env:
          ZORA_TEST_PROVIDER_CONFIG: ${{ secrets.ZORA_TEST_PROVIDER_CONFIG }}
        run: bun run test:live
