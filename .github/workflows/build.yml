name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(python3 -c 'import json; print(json.load(open("package.json"))["version"])')
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "package.json version: ${PACKAGE_VERSION}"
          echo "git tag version: ${TAG_VERSION}"

          if [[ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match package.json version (${PACKAGE_VERSION})"
            exit 1
          fi

  build:
    needs: validate-release
    if: ${{ needs.validate-release.result == 'success' || needs.validate-release.result == 'skipped' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_name: Zora-mac
            dist_script: dist:mac
            vendor_args: --platform darwin --all-arch
          - os: windows-latest
            platform: win
            artifact_name: Zora-win-x64
            dist_script: dist:win
            vendor_args: --platform win32 --all-arch

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Bun binary for bundling
        run: bun run scripts/download-bun.ts ${{ matrix.vendor_args }}

      - name: Build & Package
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for var in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID GH_TOKEN; do
            if [[ -z "${!var:-}" ]]; then
              unset "$var"
            fi
          done

          bun run ${{ matrix.dist_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: Zora ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.blockmap
            artifacts/**/latest*.yml
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
